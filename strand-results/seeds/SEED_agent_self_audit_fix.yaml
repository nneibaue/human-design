problem:
  description: |
    Meta-level consistency failure: Agent implementation code was manually written
    instead of generated by the agents themselves. This introduced anti-patterns
    that contradict the agents' own training.

    Example: Agents teach "use model_config = ConfigDict()" but their Config
    classes use legacy "class Config:" pattern.

    Root cause: Manual implementation bypassed agents → code doesn't follow training.

    Solution: Have agents audit and fix their own code. Agents know their training
    better than manual implementation. This is "agents generating agent code."

  context:
    what_happened: |
      When creating agent modules (implementer.py, test_engineer.py, d3_specialist.py),
      the system prompts were carefully crafted with Pydantic v2 training, but the
      Config classes were manually written using legacy v1 patterns.

      This created "do as I say, not as I do" inconsistency.

    root_cause: |
      Manual implementation instead of agent-generated code.

      ❌ WRONG: Human writes agent code → drift from training
      ✅ CORRECT: Agents write agent code → follows training by design

    why_this_matters: |
      Agents are the experts in their own training. When agents generate code,
      they naturally follow the patterns they were trained on. Manual implementation
      introduces inconsistencies.

      This is why CODEGEN strands exist - agent-generated code is self-consistent.

    agents_to_audit:
      - src/human_design/agents/implementer.py (416 lines)
      - src/human_design/agents/test_engineer.py (371 lines)
      - src/human_design/agents/d3_specialist.py (263 lines)
      - Note: python_linguist.py already correct (duplicated from DODO)

    known_inconsistencies:
      - Config classes use "class Config:" instead of "model_config = ConfigDict()"
      - Manual fix already applied (lines 336, 291, 155) but need agent validation
      - Possible other inconsistencies not yet discovered

  success_criteria:
    - Agents read their own implementation code
    - Agents compare code to their own system prompts (training)
    - Agents identify all inconsistencies (not just Config class)
    - Agents generate corrected code that follows training
    - Fair Witness validates: code matches training perfectly
    - All code is agent-generated (no manual fixes)

agents:
  - role: implementer
    focus: |
      Audit your own implementation code (implementer.py):

      1. Read implementer.py (lines 1-416)
      2. Read your own system prompt (IMPLEMENTER_SYSTEM_PROMPT)
      3. Compare implementation to training:
         - Does ImplementerConfig follow Pydantic v2 patterns?
         - Does factory function follow best practices?
         - Are imports correct?
         - Does the code demonstrate what the training teaches?

      4. Identify ALL inconsistencies (not just Config class)
      5. Generate corrected ImplementerConfig class
      6. Generate any other fixes needed

      Output:
      - List of inconsistencies found
      - Corrected code (Python)
      - Explanation of why changes follow training

  - role: test_engineer
    focus: |
      Audit your own implementation code (test_engineer.py):

      1. Read test_engineer.py (lines 1-371)
      2. Read your own system prompt (TEST_ENGINEER_SYSTEM_PROMPT)
      3. Compare implementation to training:
         - Does TestEngineerConfig follow Pydantic v2 patterns?
         - Does factory function follow pytest best practices?
         - Are imports correct?
         - Does the code demonstrate what the training teaches?

      4. Identify ALL inconsistencies
      5. Generate corrected TestEngineerConfig class
      6. Generate any other fixes needed

      Output:
      - List of inconsistencies found
      - Corrected code (Python)
      - Explanation of why changes follow training

  - role: architect
    focus: |
      Analyze agent architecture consistency:

      1. Read all 3 agent implementations:
         - implementer.py
         - test_engineer.py
         - d3_specialist.py

      2. Check architectural consistency:
         - Do all agents follow same structure?
         - Config classes consistent?
         - Factory functions consistent?
         - Deps dataclasses consistent?
         - Import patterns consistent?

      3. Identify architectural drift:
         - Where do implementations diverge unnecessarily?
         - Are there missing abstractions?
         - Should there be base classes or protocols?

      4. Design improvements:
         - How to ensure agents follow their own training?
         - Should agent code be 100% agent-generated?
         - How to prevent manual drift?

      Output:
      - Architectural consistency report
      - Recommendations for preventing future drift
      - Design for agent-generated agent code

  - role: fair_witness
    focus: |
      Validate that corrected code matches training:

      1. Review proposed fixes from implementer, test_engineer agents
      2. Compare fixed code to system prompt patterns
      3. Verify ALL Pydantic v2 patterns correct:
         - model_config = ConfigDict() (not class Config:)
         - Field annotations correct
         - Type hints present
         - No v1 patterns remain

      4. Check for hidden inconsistencies:
         - Are there other "do as I say, not as I do" patterns?
         - Does factory function code follow best practices?
         - Are imports demonstrating taught patterns?

      5. Validate agent-generated code quality:
         - Is corrected code better than manual fix?
         - Does it follow training more faithfully?
         - Are there any remaining gaps?

      Output:
      - Validation report (pass/fail for each agent)
      - Confidence scores (how well code matches training)
      - Any remaining inconsistencies found

  - role: coordinator
    focus: |
      Synthesize self-audit findings and generate final fixes:

      1. Integrate specialist findings:
         - Implementer: Self-audit of implementer.py
         - Test Engineer: Self-audit of test_engineer.py
         - Architect: Cross-agent architectural consistency
         - Fair Witness: Validation of proposed fixes

      2. Generate final corrected code:
         - Complete ImplementerConfig class (agent-generated)
         - Complete TestEngineerConfig class (agent-generated)
         - Complete D3SpecialistConfig class (agent-generated)
         - Any other fixes identified

      3. Meta-analysis:
         - Why did manual implementation fail?
         - How to ensure agent-generated code going forward?
         - Process improvements for agent development?

      4. Validation plan:
         - How to verify fixes are correct?
         - How to prevent regression?
         - Automated consistency checks?

      Output:
      - Complete corrected agent modules (Python code)
      - Meta-learning about agent-generated code
      - Process recommendations for future agent development

