      - Migration recommendations

  - role: coordinator
    focus: |
      Synthesize backup system implementation:

      1. Integrate specialist findings:
         - Researcher: Current 64keys integration analysis
         - Architect: SQLModel schema and backup architecture
         - Implementers: SQLModel models, backup script, CLI command
         - Test Engineer: Comprehensive test suite
         - Fair Witness: Completeness and integrity validation

      2. Final deliverables:
         - src/human_design/backup/models.py (SQLModel tables)
         - src/human_design/backup/backup_64keys.py (backup script)
         - src/human_design/backup/queries.py (query interface)
         - src/human_design/cli.py (updated with backup command)
         - tests/test_backup_*.py (comprehensive tests)

      3. Usage documentation:
         ```bash
