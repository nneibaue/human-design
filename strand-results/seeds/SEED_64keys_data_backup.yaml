problem:
  description: |
    Decouple from 64keys.com by backing up all semantic data to local SQLite database.

    Current state: Fetching gate names, descriptions, line content on-demand from 64keys API.
    Future state: Eventually implement our own semantic system, but for now archive theirs.
    Immediate need: CLI command to backup all 64keys data locally using SQLModel ORM.

    Philosophy: Preserve 64keys data as historical reference while building independence.

  context:
    brownfield: true
    existing_code:
      - src/human_design/api.py (GateAPI client - knows how to fetch from 64keys)
      - src/human_design/models/semantic.py (SemanticInterpretation schema)
      - src/human_design/cli.py (CLI entry point)

    what_to_backup:
      gates_and_lines:
        - All 64 gates (numbers 1-64)
        - All 6 lines per gate (1.1 through 64.6)
        - Gate names, summaries, descriptions
        - Line names, text, keywords
        - Quarter classifications (64keys-specific)
        - Strive guidance (64keys-specific)

      types:
        - All 5 Human Design types
        - 64keys terminology (Initiator, Builder, Specialist, Coordinator, Observer)
        - Traditional terminology mapping (Manifestor, Generator, MG, Projector, Reflector)
        - Strategy, signature, not-self theme
        - Full descriptions

      authorities:
        - All 7 authorities
        - Center dependencies
        - Decision strategies
        - Time frames

      centers:
        - All 9 centers
        - Defined/undefined descriptions
        - Shadow aspects
        - Wisdom aspects
        - Questions for contemplation

      profiles:
        - All 12 profiles (1/3, 1/4, 2/4, 2/5, 3/5, 3/6, 4/6, 4/1, 5/1, 5/2, 6/2, 6/3)
        - Display names
        - Life themes
        - Descriptions

    technical_requirements:
      - SQLModel ORM (Pydantic v2 + SQLAlchemy)
      - SQLite database (local file: ~/.human-design/64keys_backup.db)
      - CLI command: `hd backup-64keys` or `hd backup-semantics`
      - Preserve all metadata (system_id="64keys", version, timestamp)
      - Idempotent (can run multiple times without duplicates)

  success_criteria:
    - SQLModel models for all 64keys data types
    - Backup script fetches all data from 64keys API
    - Saves to SQLite with proper relationships
    - CLI command `hd backup-64keys` works end-to-end
    - Can query backed-up data (e.g., get gate 42, get profile 4/6)
    - 30+ tests covering database operations
    - No data loss (all fields preserved from 64keys)

agents:
  - role: researcher
    focus: |
      Analyze current 64keys integration:

      1. Read src/human_design/api.py (GateAPI client)
         - What endpoints does it use?
         - What data structures come back?
         - How is authentication handled?

      2. Read src/human_design/models/semantic.py
         - SemanticInterpretation schema
         - GateSemantics, LineSemantics, TypeSemantics, etc.
         - What fields need to be preserved?

      3. Identify data sources:
         - Where does gate data come from? (API calls, cached files, etc.)
         - What's the complete data set we need to backup?
         - Any data currently missing that we should capture?

      4. Research SQLModel patterns:
         - SQLModel = Pydantic + SQLAlchemy ORM
         - How to model relationships (gates -> lines, many-to-many, etc.)
         - Best practices for migration from Pydantic to SQLModel

      Deliverable:
      - Analysis of current 64keys integration
      - Complete list of data to backup
      - SQLModel pattern recommendations

  - role: architect
    focus: |
      Design SQLite backup architecture:

      1. Database schema design:
         - SQLModel table models (Gate, Line, Type, Authority, Center, Profile)
         - Relationships (Gate has many Lines, etc.)
         - Indexes for fast queries
         - Metadata table (backup timestamp, version, system_id)

      2. Backup script architecture:
         - src/human_design/backup/backup_64keys.py
         - Fetch all data from 64keys API (reuse GateAPI)
         - Transform to SQLModel instances
         - Bulk insert to SQLite
         - Progress reporting
         - Error handling (partial failures, retries)

      3. Query interface:
         - src/human_design/backup/queries.py
         - get_gate(num), get_line(gate, line), get_type(code), etc.
         - Mirror SemanticInterpretation interface for compatibility

      4. Migration strategy:
         - How to transition from live API calls to backed-up data?
         - Feature flag: USE_BACKUP_DB vs USE_64KEYS_API?
         - Fallback behavior (try backup, fall back to API)?

      Deliverable:
      - SQLModel schema design document
      - Backup script architecture
      - Query interface design
      - Migration strategy

