             def get_line(self, gate_num: int, line_num: int) -> LineBackup | None
             def get_type(self, type_code: str) -> TypeBackup | None
             # etc.
         ```

      Deliverable:
      - src/human_design/backup/models.py (SQLModel tables)
      - src/human_design/backup/backup_64keys.py (backup script)
      - src/human_design/backup/queries.py (query interface)

  - role: implementer
    focus: |
      Add CLI command for backup:

      1. Update src/human_design/cli.py:
