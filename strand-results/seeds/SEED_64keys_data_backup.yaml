         hd backup-64keys --force
         ```

      4. Migration strategy:
         - Phase 1: Backup data (this strand)
         - Phase 2: Add query interface to use backed-up data
         - Phase 3: Implement fallback (backup → API)
         - Phase 4: Implement our own semantic system

      5. Next steps:
         - After backup exists, update semantic loader to use local DB
         - Eventually replace 64keys data with custom interpretations
         - Preserve 64keys backup as historical reference

      Deliverable:
      - Complete backup system implementation
      - Usage guide and migration strategy
      - Recommendations for next steps

