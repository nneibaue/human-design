      2. Data integrity check:
         - Do backed-up gate names match 64keys?
         - Are relationships preserved (gates -> lines)?
         - Is metadata captured (system_id, version, timestamp)?
         - Can backed-up data reconstruct SemanticInterpretation model?

      3. Schema validation:
         - SQLModel models match Pydantic models?
