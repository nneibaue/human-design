problem:
  description: |
    Third iteration of agent training refinement using Python-first agent pattern.
    Apply principle: "anything done once should be done twice" - this is the THIRD
    pass on training refinement.

    Previous iterations:
    1. Initial training enhancement (150 → 372 lines)
    2. Audit + HIGH priority gaps (@computed_field, model_dump) (372 → 416 lines)

    New approach: Use Python-first agent definitions (pydantic-ai patterns, Pydantic v2
    configs, system prompts embedded in code) instead of JSON-based agent loading.

    This strand uses the "new system" where agents are:
    - Defined in Python modules (not JSON specs)
    - Use pydantic_ai.Agent class directly
    - Have Pydantic v2 config classes
    - System prompts embedded as Python strings
    - Follow DODO agent architecture pattern

  context:
    new_system_pattern: |
      # Python-First Agent Pattern (DODO-style)

      from pydantic import BaseModel, Field
      from pydantic_ai import Agent, RunContext
      from dataclasses import dataclass
      from pathlib import Path

      # System prompt embedded in Python
      AGENT_SYSTEM_PROMPT = '''You are an Agent...'''

      # Pydantic v2 config class
      class AgentConfig(BaseModel):
          workspace_root: Path = Field(...)
          model: str = Field(default="claude-sonnet-4-20250514")

      # Agent dependencies
      @dataclass
      class AgentDeps:
          workspace_root: Path

      # Agent factory function
      def create_agent(deps: AgentDeps, model: str | None = None) -> Agent:
          agent = Agent(
              model=model or "claude-sonnet-4-20250514",
              system_prompt=AGENT_SYSTEM_PROMPT,
              deps_type=AgentDeps,
          )
          return agent

    recent_training_state:
