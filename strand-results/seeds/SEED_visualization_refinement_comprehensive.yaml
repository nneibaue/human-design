         - Avoid leaky implementation names

      2. **D3 v7 patterns** (static/js/d3-bodygraph.js):
         ```javascript
         // Main renderer
         function renderBodygraph(data, containerId) {
           const svg = d3.select(containerId).append("svg")
             .attr("viewBox", SVG_VIEWBOX);

           drawCenters(svg, data.centers);
           drawChannels(svg, data.channels);
           drawActivations(svg, data.activations);
           applyRebeccaTheme(svg);
           attachInteractions(svg);
         }

         // Center rendering with shape dispatch
         function drawCenters(svg, centers) {
           svg.selectAll(".center")
             .data(centers, d => d.name)
             .join("g")
             .attr("class", "center")
             .attr("transform", d => `translate(${d.position[0]}, ${d.position[1]})`)
             .each(function(d) {
               const shape = d.shape === "triangle" ? drawTriangle :
                             d.shape === "square" ? drawSquare : drawDiamond;
               shape(d3.select(this), d);
             });
         }

         // Channel rendering
         function drawChannels(svg, channels) {
           svg.selectAll(".channel")
             .data(channels)
             .join("path")
             .attr("class", d => `channel ${d.is_active ? "active" : "inactive"} ${d.is_emergent ? "emergent" : ""}`)
             .attr("d", d => d.path)
             .style("stroke", d => d.color);
         }
         ```

