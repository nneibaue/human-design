         from typing import Literal
         from pydantic import BaseModel

         CenterShape = Literal["triangle", "square", "diamond"]

         class CenterGeometry(BaseModel):
             name: str
             position: tuple[float, float]
             shape: CenterShape
             radius: float  # Or width/height

         class ChannelGeometry(BaseModel):
             channel_id: str
             gate_a: int
             gate_b: int
             path: str  # SVG path string
             gate_a_position: tuple[float, float]
             gate_b_position: tuple[float, float]

         # Constants extracted from 64keys
         CENTERS: dict[str, CenterGeometry] = { ... }
         CHANNELS: dict[str, ChannelGeometry] = { ... }
         SVG_VIEWBOX = "0 0 800 1000"  # Example
         ```

